services:
  app:
    build:
      context: .
    container_name: test_task_manager
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: test_task_manager_db
    ports:
      - "3307:3306"
    volumes:
      - test_task_manager_db_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: test_task_manager_db
      MYSQL_USER: pseudo
      MYSQL_PASSWORD: pseudo
      MYSQL_ROOT_PASSWORD: Pseudo

volumes:
  test_task_manager_db_data: